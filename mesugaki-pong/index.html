<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MESUGAKI Pong</title>
  </head>

  <body>
    <a href="/" class="back-link"
      ><span class="back-icon">←</span> BACK TO PORTAL</a
    >
    <div id="app">
      <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui-layer">
          <img
            src="./src/assets/start_screen.png"
            id="start-screen-img"
            alt="Start Screen"
          />
          <h1 id="titleText">MESUGAKI PONG</h1>
          <p id="descText">ボールを打ち返せ！ただし、何かおかしいかも……？</p>
          <button id="start-btn">START</button>
        </div>
      </div>
      <div id="annoying-message"></div>
      <footer class="app-footer">
        <div class="footer-content">
          <p>
            &copy; 2026 HappyOnigiri. All rights reserved.
            <span id="app-version"></span>
          </p>
          <div class="footer-links">
            <a
              href="https://x.com/H_OnigiriWorks"
              target="_blank"
              rel="noopener noreferrer"
              title="X (Twitter)"
              class="x-link"
            >
              <img
                src="/assets/logos/logo_x.svg"
                alt="X"
                width="18"
                height="18"
              />
            </a>
            <a
              href="https://github.com/HappyOnigiri/game-portal"
              target="_blank"
              rel="noopener noreferrer"
              title="GitHub"
              class="github-link"
            >
              <img
                src="/assets/logos/logo_github.svg"
                alt="GitHub"
                width="20"
                height="20"
              />
            </a>
          </div>
        </div>
      </footer>
    </div>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
