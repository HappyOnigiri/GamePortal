<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Portal</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background-color: #f5f5f7;
      color: #1d1d1f;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      transition: transform 0.2s, box-shadow 0.2s;
      border: 1px solid #e5e5ea;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
    }

    .card h2 {
      margin: 0 0 10px 0;
      font-size: 1.25rem;
      color: #007aff;
    }

    .card p {
      margin: 0;
      font-size: 0.9rem;
      color: #86868b;
    }
  </style>
</head>

<body>
  <h1>Applications Portal</h1>
  <div class="grid">
    <a href="./ethereal-strings/" class="card">
      <h2>Ethereal Strings</h2>
      <p>Interactive Audio-Visual Art</p>
    </a>
    <a href="./focus-crystallizer/" class="card">
      <h2>Focus Crystallizer</h2>
      <p>Focus your mind, grow your crystal</p>
    </a>
    <a href="./orbital-symphony/" class="card">
      <h2>Orbital Symphony</h2>
      <p>Physics-based ambient music</p>
    </a>
    <a href="./time-lapse-note/" class="card">
      <h2>Time Lapse Note</h2>
      <p>Chronological text editor</p>
    </a>
    <a href="./zen-particles/" class="card">
      <h2>Particle Zen</h2>
      <p>Interactive digital sand garden</p>
    </a>
  </div>
</body>

</html>
