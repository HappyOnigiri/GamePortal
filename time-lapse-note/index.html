<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>タイムラプス・ノート</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">
</head>

<body>
  <!-- ヘッダー -->
  <header class="header">
    <div class="header-inner">
      <h1>Time-Lapse Note</h1>
      <p class="subtitle">思考の軌跡を再体験するメモ帳</p>
    </div>
  </header>

  <!-- メインテキストエリア -->
  <main class="main-container">
    <div class="textarea-wrapper">
      <textarea id="editor" placeholder="ここにテキストを入力してください..." spellcheck="false"></textarea>
      <!-- 差分表示用（将来的にビジュアル演出で使うかも） -->
      <div class="overlay" id="overlay"></div>
    </div>
  </main>

  <!-- コントロールパネル (フッター) -->
  <footer class="footer">
    <div class="controls-panel">
      <div class="timeline-container">
        <span class="time-display" id="timeDisplay">00:00.00</span>
        <input type="range" id="timeline" min="0" max="100" value="100" step="0.1" class="slider">
        <span class="status-indicator" id="statusIndicator">Live</span>
      </div>

      <div class="actions-container">
        <button id="playBtn" class="btn play-btn" title="再生" disabled>
          <svg viewBox="0 0 24 24" fill="none" class="icon" id="playIcon">
            <path d="M8 5V19L19 12L8 5Z" fill="currentColor" />
          </svg>
          <svg viewBox="0 0 24 24" fill="none" class="icon hidden" id="pauseIcon">
            <path d="M6 19H10V5H6V19ZM14 5V19H18V5H14Z" fill="currentColor" />
          </svg>
        </button>

        <button id="resetBtn" class="btn secondary-btn" title="クリア">
          <svg viewBox="0 0 24 24" fill="none" class="icon">
            <path
              d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z"
              fill="currentColor" />
          </svg>
        </button>
      </div>
    </div>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
